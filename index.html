<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swing Lab — hyperreal cricket bowling simulator</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f14; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    #app { position: fixed; inset: 0; }
    #title {
      position: fixed; top: 12px; left: 14px; color: #eef3f8; z-index: 5;
      text-shadow: 0 1px 4px rgba(0,0,0,.6); user-select: none;
    }
    #title h1 { margin: 0; font-size: 17px; letter-spacing: .4px; }
    #title p { margin: 2px 0 0; font-size: 11.5px; opacity: .75; }
    #speedo {
      position: fixed; top: 64px; left: 14px; z-index: 5; display: none;
      font: 700 26px/1 ui-monospace, Menlo, monospace; color: #ffe45c;
      text-shadow: 0 1px 6px rgba(0,0,0,.7);
    }
    #story {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 6; display: none; width: min(560px, 70vw); text-align: center;
      background: rgba(10, 16, 24, .82); backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 213, 92, .35); border-radius: 12px;
      padding: 10px 16px; color: #e7eef6;
      box-shadow: 0 6px 24px rgba(0,0,0,.45);
    }
    #story .sname { font-weight: 800; font-size: 15px; color: #ffd75c; letter-spacing: .3px; }
    #story .smeta { font-size: 10.5px; opacity: .72; margin: 3px 0 6px; text-transform: uppercase; letter-spacing: .4px; }
    #story .stext { font-size: 12.5px; line-height: 1.45; opacity: .92; }
    #results {
      position: fixed; left: 14px; bottom: 78px; z-index: 5; display: none;
      background: rgba(10, 16, 24, .82); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
      padding: 12px 14px; color: #dfe7ef; width: 320px; font-size: 12.5px;
    }
    #results .verdict { font-weight: 700; font-size: 14px; margin-bottom: 8px; color: #9fd7ff; }
    #results .verdict.out { color: #ff5c5c; }
    #results .row { display: flex; justify-content: space-between; gap: 12px; padding: 2.5px 0; border-top: 1px solid rgba(255,255,255,.06); }
    #results .row span { opacity: .7; }
    #bar {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      z-index: 5; display: flex; gap: 10px; align-items: center;
    }
    #bar button {
      cursor: pointer; border: 0; border-radius: 999px; color: #fff;
      font-weight: 700; letter-spacing: .5px;
    }
    #bowlBtn {
      padding: 14px 38px; font-size: 16px;
      background: linear-gradient(135deg, #e5322d, #a31410);
      box-shadow: 0 4px 18px rgba(229, 50, 45, .45);
    }
    #bowlBtn:hover { filter: brightness(1.1); }
    #replayBtn { padding: 11px 20px; font-size: 13px; background: #2b3a4d; }
    #hint { position: fixed; bottom: 4px; left: 50%; transform: translateX(-50%); color: #fff; opacity: .45; font-size: 10.5px; z-index: 5; }
    .lil-gui { --width: 320px; max-height: 92vh; overflow-y: auto; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="title">
    <h1>🏏 Swing Lab</h1>
    <p>physics-true swing · reverse · drift · dip · seam — every parameter yours</p>
  </div>
  <div id="speedo"></div>
  <div id="story"></div>
  <div id="results"></div>
  <div id="bar">
    <button id="bowlBtn">BOWL</button>
    <button id="replayBtn">REPLAY</button>
  </div>
  <div id="hint">space = bowl · R = replay · drag to orbit, scroll to zoom</div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
